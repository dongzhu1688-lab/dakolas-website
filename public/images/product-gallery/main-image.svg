    <rect x="500" y="146" width="196" height="286" rx="22" fill="#071f45"/>
    <rect x="532" y="196" width="132" height="132" rx="16" fill="#eaf4ff"/>
    <path d="M558 356h80" stroke="#0756b8" stroke-width="18" stroke-linecap="round"/>
    <rect x="480" y="456" width="244" height="50" rx="12" fill="#073b84"/>
