<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">DAKOLAS product main image</title>
  <desc id="desc">Photo style product render showing mobile repair parts for wholesale sourcing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#dceeff"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071f45"/>
      <stop offset="1" stop-color="#0756b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#071f45" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <rect x="60" y="62" width="840" height="476" rx="28" fill="#fff" stroke="#d9e5f4"/>
