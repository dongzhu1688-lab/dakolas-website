  </g>
  <text x="88" y="114" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#073b84">Premium Screens &amp; Batteries</text>
  <text x="88" y="148" font-family="Arial, sans-serif" font-size="17" fill="#5e6b7e">Wholesale mobile repair parts</text>
