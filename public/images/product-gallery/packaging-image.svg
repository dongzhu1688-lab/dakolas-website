<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">DAKOLAS packaging image</title>
  <desc id="desc">Export packaging render showing cartons and DAKOLAS wholesale packing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#dceeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#071f45" flood-opacity=".15"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <rect x="70" y="58" width="820" height="484" rx="28" fill="#fff" stroke="#d9e5f4"/>
  <g filter="url(#shadow)">
    <rect x="176" y="260" width="236" height="162" rx="12" fill="#c99b62"/>
    <rect x="466" y="198" width="270" height="224" rx="12" fill="#d8ad76"/>
    <rect x="210" y="294" width="166" height="20" rx="10" fill="#073b84"/>
    <rect x="504" y="240" width="190" height="22" rx="11" fill="#073b84"/>
    <rect x="504" y="296" width="140" height="22" rx="11" fill="#073b84"/>
  </g>
  <text x="230" y="382" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#073b84">DAKOLAS</text>
  <text x="526" y="374" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#073b84">EXPORT</text>
  <text x="118" y="112" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#073b84">Wholesale Packaging</text>
  <text x="118" y="144" font-family="Arial, sans-serif" font-size="17" fill="#5e6b7e">Model labels, cartons and shipment preparation</text>
</svg>
